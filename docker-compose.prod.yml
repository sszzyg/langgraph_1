services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langraph-api
    ports:
      - "8501:8000"
    environment:
      - KB_DIR=.faiss
      - PYTHONPATH=/app
    env_file:
      - .env.server
    volumes:
      - ./.faiss:/app/.faiss
      - ./app/library:/app/app/library:ro
    restart: unless-stopped
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
